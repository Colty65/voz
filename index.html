
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>VOZ postoperatoria v8.0</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;background:#0b1220;color:#fff;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
h1{font-size:28px;margin-bottom:5px}
.top{display:flex;justify-content:space-between;align-items:center}
.langs{display:flex;gap:10px;margin:10px 0}
textarea{width:100%;height:100px;border-radius:10px;padding:10px;font-size:16px}
.buttons{display:flex;gap:10px;margin-top:10px}
button{padding:12px;border-radius:10px;border:none;cursor:pointer}
.speak{background:#334155;color:#fff}
.save{background:#0f766e;color:#fff}
.list{margin-top:20px}
.item{background:#1e293b;padding:10px;border-radius:10px;margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
<div class="top">
<h1>VOZ postoperatoria</h1>
<div>
<div>(c)oltyLAB ‘26</div>
<div>V8.0</div>
</div>
</div>

<div class="langs">
<select id="src">
<option value="es">Español</option>
<option value="en">English</option>
</select>
<select id="dst">
<option value="es-ES">Español</option>
<option value="en-US">English</option>
</select>
</div>

<textarea id="txt" placeholder="Escribe aquí..."></textarea>

<div class="buttons">
<button class="speak" onclick="speak()">Hablar</button>
<button class="save" onclick="save()">Hablar+Guardar</button>
</div>

<div id="out" style="margin-top:10px;font-weight:bold"></div>

<div class="list" id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("voz_v8")||"[]");

function render(){
  let src=document.getElementById("src").value;
  let list=document.getElementById("list");
  list.innerHTML="";
  data.filter(x=>x.src===src).forEach(x=>{
    let d=document.createElement("div");
    d.className="item";
    d.innerHTML=x.text+" ("+x.src+")";
    d.onclick=()=>doSpeak(x.text);
    list.appendChild(d);
  });
}

async function translate(t){
  let src=document.getElementById("src").value;
  let dst=document.getElementById("dst").value.split("-")[0];
  if(src===dst) return t;
  try{
    let r=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(t)+"&langpair="+src+"|"+dst);
    let j=await r.json();
    return j.responseData.translatedText;
  }catch(e){return t;}
}

async function doSpeak(t){
  let tr=await translate(t);
  document.getElementById("out").innerText=tr;
  let u=new SpeechSynthesisUtterance(tr);
  u.lang=document.getElementById("dst").value;
  speechSynthesis.speak(u);
}

function speak(){
  let t=document.getElementById("txt").value;
  if(!t)return;
  doSpeak(t);
}

function save(){
  let t=document.getElementById("txt").value;
  if(!t)return;
  let src=document.getElementById("src").value;
  data.push({text:t,src});
  localStorage.setItem("voz_v8",JSON.stringify(data));
  speak();
  render();
}

document.getElementById("src").onchange=render;
render();
</script>

</body>
</html>
