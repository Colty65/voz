
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>Voz postoperatoria v4.1</title>
<style>
:root{--bg:#0b1220;--card:#121a2b;--card2:#182235;--text:#f3f4f6;--muted:#b7c0cf;--border:#2b3850}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#09101c,#10192b 40%,#0b1220)}
.app{max-width:1020px;margin:0 auto;min-height:100vh;padding:16px 14px 28px}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
.title{font-size:1.16rem;font-weight:800}.sub{font-size:.9rem;color:var(--muted)}.tag{border:1px solid var(--border);padding:10px 12px;border-radius:999px;color:var(--muted);font-size:.84rem}
h1{margin:0 0 8px;font-size:1.35rem;line-height:1.15} p{margin:0;color:var(--muted);line-height:1.45}
.status,.result,.box,.raw{border:1px solid var(--border);border-radius:18px;padding:14px;background:#0d1523}
.result{font-size:1.45rem;font-weight:900;text-align:center}.raw{font-size:1.02rem}
.sep{height:1px;background:var(--border);margin:14px 0}.label{font-size:.82rem;color:var(--muted);margin-bottom:6px}
button,input,textarea{width:100%;font:inherit;border-radius:18px;border:1px solid var(--border)}
input,textarea{padding:14px;background:#0d1523;color:var(--text)} textarea{min-height:86px;resize:vertical}
button{padding:16px 14px;color:var(--text);font-weight:800;background:#1b2740;cursor:pointer}
.primary{background:linear-gradient(180deg,#2f90cb,#2679ab);border:none}.success{background:linear-gradient(180deg,#208c6d,#176f57);border:none}.danger{background:linear-gradient(180deg,#b34f4f,#8c3d3d);border:none}.ghost{background:#10151d}
.small{color:var(--muted);font-size:.92rem;line-height:1.4}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:760px){.grid2{grid-template-columns:1fr}}
.audio-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.audio-row button{width:auto;padding:10px 12px;border-radius:12px}
.big-indicator{margin-top:12px;padding:18px;border-radius:18px;text-align:center;font-size:1.45rem;font-weight:900;border:2px solid rgba(255,255,255,.15);background:#111827}
.hidden{display:none!important}
.item{background:#111a2b;border:1px solid var(--border);border-radius:18px;padding:12px;margin-bottom:10px}
.meta{font-size:.84rem;color:var(--muted);margin-top:6px}
.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#101726;border:1px solid var(--border);color:var(--muted);font-size:.8rem;margin:4px 6px 0 0}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <div class="title">Voz postoperatoria</div>
      <div class="sub">Secuencia de sonidos → secuencia de palabras</div>
    </div>
    <div class="tag">(c)oltyLAB '26 V4.1</div>
  </div>

  <section class="card">
    <h1>Entrena sonidos y construye frases</h1>
    <p>Define sonidos como "aua", "ero"... y asígnales palabras reales. Luego la app encadena automáticamente.</p>
  </section>

  <section class="card">
    <div class="label">Escuchar secuencia</div>
    <button class="primary" onclick="listen()">Escuchar</button>
    <div class="sep"></div>
    <div class="label">Detectado</div>
    <div class="raw" id="heard">—</div>
    <div class="label">Resultado</div>
    <div class="result" id="result">—</div>
  </section>

  <section class="card">
    <div class="label">Nuevo sonido</div>
    <input id="token" placeholder="Ej: aua">
    <input id="real" placeholder="Ej: Agua">
    <button class="success" onclick="save()">Guardar</button>
  </section>

  <section class="card">
    <div class="label">Aprendidos</div>
    <div id="list"></div>
  </section>
</div>

<script>
let data = JSON.parse(localStorage.getItem("voz_v41")||"[]");

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";
  data.forEach(d=>{
    list.innerHTML += "<div class='item'><span class='pill'>"+d.t+"</span> → "+d.r+"</div>";
  });
}
render();

function save(){
  const t = document.getElementById("token").value.trim();
  const r = document.getElementById("real").value.trim();
  if(!t||!r) return alert("rellena ambos");
  data.push({t,r});
  localStorage.setItem("voz_v41",JSON.stringify(data));
  render();
}

function normalize(s){
  return s.toLowerCase().replace(/[^a-záéíóúñ ]/gi,"").trim();
}

function listen(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return alert("no compatible");
  const sr = new SR();
  sr.lang="es-ES";
  sr.onresult = e=>{
    const text = e.results[0][0].transcript;
    document.getElementById("heard").innerText=text;
    const tokens = normalize(text).split(" ");
    let res=[];
    tokens.forEach(tok=>{
      let f = data.find(d=>normalize(d.t)==tok);
      if(f) res.push(f.r);
      else res.push("?");
    });
    const phrase = res.join(" ");
    document.getElementById("result").innerText=phrase;
    speechSynthesis.speak(new SpeechSynthesisUtterance(phrase));
  };
  sr.start();
}
</script>
</body>
</html>
